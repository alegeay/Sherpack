<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none" role="img" aria-label="Sherpack logo">
  <title>Sherpack</title>
  <defs>
    <linearGradient id="sherpackBrand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0dffc4"/>
      <stop offset="100%" stop-color="#00b396"/>
    </linearGradient>
    <filter id="sherpackGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#sherpackGlow)">
    <!-- Top peak chevron — sharpest, leads the eye -->
    <path d="M16 22 L32 9 L48 22"
          stroke="url(#sherpackBrand)" stroke-width="4.2"
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Middle chevron — same arc, pulled down, reduced opacity (depth) -->
    <path d="M14 37 L32 22 L50 37"
          stroke="url(#sherpackBrand)" stroke-width="4.2"
          stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.75"/>
    <!-- Bottom chevron — base of the stack, fading out -->
    <path d="M12 52 L32 35 L52 52"
          stroke="url(#sherpackBrand)" stroke-width="4.2"
          stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.45"/>
  </g>
</svg>
